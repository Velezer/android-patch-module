name: tests

on:
  push:
  pull_request:

jobs:
  patch-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Regenerate Gradle wrapper (CI-safe)
        run: gradle wrapper --gradle-version 8.14.3
      - name: Run patch-core tests
        run: gradle :patch-core:test --configure-on-demand --no-daemon
