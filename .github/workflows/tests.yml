name: tests

on:
  push:
  pull_request:

jobs:
  patch-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run patch-core tests
        run: gradle :patch-core:test --configure-on-demand
